<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — SchoolOS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0c0c0f;
            --surface: #13131a;
            --border:  #22222e;
            --accent:  #6c63ff;
            --accent2: #a78bfa;
            --text:    #e8e8f0;
            --muted:   #5a5a72;
            --error:   #ff5f6d;
            --success: #4ade80;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse 50% 60% at 30% 30%, rgba(108,99,255,.11) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 70%, rgba(167,139,250,.07) 0%, transparent 50%);
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            animation: slideUp .4s cubic-bezier(.16,1,.3,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .15em;
            color: var(--accent2);
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -.02em;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,.15);
        }

        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .06em;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }

        .btn:hover  { background: #7c74ff; }
        .btn:active { transform: scale(.98); }

        .msg {
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .msg.error { background: rgba(255,95,109,.1); border: 1px solid rgba(255,95,109,.3); color: var(--error); }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }
        .footer a { color: var(--accent2); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">SchoolOS</div>
    <h1>Вход</h1>
    <p class="subtitle">Войдите в свой аккаунт</p>

    <div class="msg" id="msg"></div>

    <form id="form">
        <div class="field">
            <label>Имя пользователя</label>
            <input type="text" id="username" placeholder="ivan_petrov" required autocomplete="username">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Войти</button>
    </form>

    <div class="footer">
        Нет аккаунта? <a href="/register">Зарегистрироваться</a>
    </div>
</div>

<script>
    const msg = document.getElementById('msg');

    function showMsg(text) {
        msg.textContent = text;
        msg.className = 'msg error';
        msg.style.display = 'block';
    }

    document.getElementById('form').addEventListener('submit', async e => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) return showMsg('Заполните все поля');

        try {
            const res  = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                showMsg(data.error || 'Неверные данные');
            }
        } catch {
            showMsg('Ошибка подключения к серверу');
        }
    });
</script>
</body>
</html>
