<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задачи — SchoolOS</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0c0c0f;
--surface:#13131a;
--border:#22222e;
--accent:#6c63ff;
--accent2:#a78bfa;
--text:#e8e8f0;
--muted:#5a5a72;
--error:#ff5f6d;
}

body{
font-family:'Manrope',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid var(--border);
}

.logo{
font-family:'JetBrains Mono',monospace;
font-weight:700;
color:var(--accent2);
}

main{
max-width:900px;
margin:0 auto;
padding:60px 24px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
}

.section-label{
font-family:'JetBrains Mono',monospace;
font-size:12px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--accent2);
}

.add-btn{
background:var(--accent);
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-family:'JetBrains Mono',monospace;
}

.tasks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:16px;
}

.task{
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.task-title{
font-family:'JetBrains Mono',monospace;
font-weight:600;
}

.task-desc{
font-size:13px;
color:var(--muted);
}

.task-meta{
font-size:12px;
color:var(--muted);
}

.actions{
display:flex;
gap:8px;
margin-top:8px;
}

.btn{
font-family:'JetBrains Mono',monospace;
font-size:11px;
background:transparent;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.delete-btn{
border:1px solid rgba(255,95,109,.3);
color:var(--error);
}

.edit-btn{
border:1px solid rgba(108,99,255,.4);
color:var(--accent2);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:28px;
width:100%;
max-width:420px;
}

.field{margin-bottom:14px}

label{
font-size:11px;
color:var(--muted);
display:block;
margin-bottom:6px;
text-transform:uppercase;
}

input,textarea,select{
width:100%;
background:var(--bg);
border:1px solid var(--border);
border-radius:8px;
padding:10px;
color:var(--text);
}

.submit-btn{
width:100%;
margin-top:8px;
padding:12px;
background:var(--accent);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<div class="logo">SchoolOS</div>
</header>

<main>

<div class="section-header">
<div class="section-label">// Задачи</div>
<button class="add-btn" onclick="openModal()">+ Новая задача</button>
</div>

<div id="tasks" class="tasks"></div>

</main>

<div class="modal" id="modal">
<div class="modal-card">

<form id="taskForm">

<div class="field">
<label>Название</label>
<input id="title" required>
</div>

<div class="field">
<label>Описание</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Срок выполнения</label>
<input type="datetime-local" id="time">
</div>

<div class="field">
<label>Важность</label>
<select id="importance">
<option value="1">Низкая</option>
<option value="2">Средняя</option>
<option value="3">Высокая</option>
</select>
</div>

<button class="submit-btn" id="submitBtn">Создать задачу</button>

</form>

</div>
</div>

<script>

let editingTaskId=null;

async function loadTasks(){

const res=await fetch("/api/tasks");
const tasks=await res.json();

const container=document.getElementById("tasks");
container.innerHTML="";

tasks.forEach(task=>{

const el=document.createElement("div");
el.className="task";

el.innerHTML=`
<div class="task-title">${task.title}</div>
<div class="task-desc">${task.description||""}</div>
<div class="task-meta">Срок: ${task.time||"-"}</div>
<div class="task-meta">Важность: ${task.importance}</div>

<div class="actions">
<button class="btn edit-btn" onclick='editTask(${JSON.stringify(task)})'>Изменить</button>
<button class="btn delete-btn" onclick="deleteTask(${task.id})">Удалить</button>
</div>
`;

container.appendChild(el);

});

}

async function deleteTask(id){

if(!confirm("Удалить задачу?"))return;

await fetch(`/api/tasks/${id}`,{
method:"DELETE"
});

loadTasks();

}

function editTask(task){

editingTaskId=task.id;

document.getElementById("title").value=task.title;
document.getElementById("description").value=task.description||"";

if(task.time){
document.getElementById("time").value=task.time.replace(" ","T");
}

document.getElementById("importance").value=task.importance;

document.getElementById("submitBtn").textContent="Сохранить";

openModal();

}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
editingTaskId=null;
document.getElementById("taskForm").reset();
document.getElementById("submitBtn").textContent="Создать задачу";
}

document.getElementById("taskForm").addEventListener("submit",async e=>{

e.preventDefault();

let time=document.getElementById("time").value;
if(time){time=time.replace("T"," ");}

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const importance=document.getElementById("importance").value;

const method=editingTaskId?"PUT":"POST";

await fetch("/api/tasks",{
method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id:editingTaskId,
title,
description,
time,
importance
})
});

closeModal();
loadTasks();

});

loadTasks();

</script>

</body>
</html>
