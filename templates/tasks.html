<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задачи — SchoolOS</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root{
--bg:#0c0c0f;
--surface:#13131a;
--border:#22222e;
--accent:#6c63ff;
--accent2:#a78bfa;
--text:#e8e8f0;
--muted:#5a5a72;
--error:#ff5f6d;
}

body{
font-family:'Manrope',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;

background-image:
radial-gradient(ellipse 55% 45% at 80% 10%, rgba(108,99,255,.1) 0%, transparent 60%),
radial-gradient(ellipse 40% 50% at 10% 90%, rgba(167,139,250,.06) 0%, transparent 50%);
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 40px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:rgba(12,12,15,.85);
backdrop-filter:blur(12px);
}

.logo{
font-family:'JetBrains Mono', monospace;
font-size:14px;
font-weight:700;
letter-spacing:.12em;
color:var(--accent2);
}

.header-right{
display:flex;
align-items:center;
gap:16px;
}

.username-tag{
font-family:'JetBrains Mono', monospace;
font-size:12px;
color:var(--muted);
background:var(--surface);
border:1px solid var(--border);
border-radius:6px;
padding:5px 10px;
}

.logout-btn{
font-family:'JetBrains Mono', monospace;
font-size:12px;
font-weight:600;
letter-spacing:.06em;
color:var(--error);
background:transparent;
border:1px solid rgba(255,95,109,.3);
border-radius:6px;
padding:6px 12px;
cursor:pointer;
}

.logout-btn:hover{
background:rgba(255,95,109,.08);
}

main{
max-width:900px;
margin:0 auto;
padding:60px 24px 80px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
}

.section-label{
font-family:'JetBrains Mono', monospace;
font-size:12px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--accent2);
}

.add-btn{
background:var(--accent);
border:none;
color:#fff;
padding:10px 16px;
border-radius:8px;
font-family:'JetBrains Mono', monospace;
font-size:12px;
cursor:pointer;
}

.add-btn:hover{
background:#7c74ff;
}

.tasks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:16px;
}

.task{
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
transition:.2s;
}

.task:hover{
border-color:var(--accent);
transform:translateY(-3px);
}

.task-title{
font-family:'JetBrains Mono', monospace;
font-size:15px;
font-weight:600;
}

.task-desc{
font-size:13px;
color:var(--muted);
}

.task-meta{
font-size:12px;
color:var(--muted);
}

.delete-btn{
font-family:'JetBrains Mono', monospace;
font-size:11px;
border:1px solid rgba(255,95,109,.3);
background:transparent;
color:var(--error);
border-radius:6px;
padding:6px 10px;
cursor:pointer;
margin-top:8px;
}

.delete-btn:hover{
background:rgba(255,95,109,.08);
}

.empty{
text-align:center;
color:var(--muted);
margin-top:40px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:28px;
width:100%;
max-width:420px;
}

.field{
margin-bottom:14px;
}

label{
font-size:11px;
color:var(--muted);
display:block;
margin-bottom:6px;
text-transform:uppercase;
}

input, textarea, select{
width:100%;
background:var(--bg);
border:1px solid var(--border);
border-radius:8px;
padding:10px;
color:var(--text);
font-family:'Manrope',sans-serif;
}

textarea{ resize:vertical; }

.submit-btn{
width:100%;
margin-top:8px;
padding:12px;
background:var(--accent);
border:none;
border-radius:8px;
color:white;
font-family:'JetBrains Mono', monospace;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">SchoolOS</div>

<div class="header-right">
<span class="username-tag">{{ username }}</span>

<form method="POST" action="/api/logout">
<button class="logout-btn">Выйти</button>
</form>
</div>
</header>

<main>

<div class="section-header">
<div class="section-label">// Задачи</div>
<button class="add-btn" onclick="openModal()">+ Новая задача</button>
</div>

<div id="tasks" class="tasks"></div>
<div id="empty" class="empty" style="display:none">Нет задач</div>

</main>

<div class="modal" id="modal">
<div class="modal-card">

<form id="taskForm">

<div class="field">
<label>Название</label>
<input id="title" required>
</div>

<div class="field">
<label>Описание</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Срок выполнения</label>
<input type="datetime-local" id="time">
</div>

<div class="field">
<label>Важность</label>
<select id="importance">
<option value="1">Низкая</option>
<option value="2">Средняя</option>
<option value="3">Высокая</option>
</select>
</div>

<button class="submit-btn">Создать задачу</button>

</form>

</div>
</div>

<script>

async function loadTasks(){

const res = await fetch("/api/tasks");
const tasks = await res.json();

const container = document.getElementById("tasks");
const empty = document.getElementById("empty");

container.innerHTML="";

if(!tasks.length){
empty.style.display="block";
return;
}

empty.style.display="none";

tasks.forEach(task=>{

const el = document.createElement("div");
el.className="task";

el.innerHTML=`
<div class="task-title">${task.title}</div>
<div class="task-desc">${task.description || ""}</div>
<div class="task-meta">Срок: ${task.time || "-"}</div>
<div class="task-meta">Важность: ${task.importance}</div>

<button class="delete-btn" onclick="deleteTask(${task.id})">Удалить</button>
`;

container.appendChild(el);

});

}

async function deleteTask(id){

if(!confirm("Удалить задачу?")) return;

await fetch(`/api/tasks/${id}`,{
method:"DELETE"
});

loadTasks();

}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("taskForm").addEventListener("submit", async e=>{

e.preventDefault();

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const time = document.getElementById("time").value;
const importance = document.getElementById("importance").value;

await fetch("/api/tasks",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
title,
description,
time,
importance
})
});

closeModal();
loadTasks();

});

loadTasks();

</script>

</body>
</html>
